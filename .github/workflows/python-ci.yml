name: Python CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-html

      # 4️⃣ Run tests + Generate reports
      - name: Run tests and generate reports
        run: |
          pytest \
            --junitxml=report.xml \
            --html=report.html \
            --self-contained-html

      # 5️⃣ Upload HTML Report (Beautiful browser view)
      - name: Upload HTML Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: html-test-report
          path: report.html

      # 6️⃣ Upload JUnit XML (For parsing & history)
      - name: Upload JUnit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-report
          path: report.xml

      # 7️⃣ Publish results inside GitHub UI (Checks tab)
      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Pytest Results
          path: report.xml
          reporter: java-junit